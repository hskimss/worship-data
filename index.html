<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf8f5">
<title>말씀 멘토링 - A Church London</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh; background: #faf8f5;
  font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  color: #3d3530; display: flex; flex-direction: column;
  max-width: 640px; margin: 0 auto;
}
.header {
  padding: 36px 20px 16px; border-bottom: 1px solid #ede8e2;
  text-align: center; flex-shrink: 0; position: relative; background: #fff;
}
.header-dots { font-size: 10px; color: #c8b4a0; letter-spacing: 6px; margin-bottom: 8px; }
.header-title { font-size: 22px; font-weight: 700; color: #5c4a3a; letter-spacing: 0.5px; margin-bottom: 3px; }
.header-sub { font-size: 10px; color: #b8a898; letter-spacing: 3px; }
.header-count { font-size: 11px; color: #c8a888; margin-top: 4px; }
.btn-stats {
  position: absolute; top: 36px; right: 16px;
  background: #fff5ee; border: 1px solid #f0d8c8; border-radius: 20px;
  padding: 6px 13px; font-size: 12px; color: #c07850; cursor: pointer; -webkit-appearance: none;
}
.btn-stats:active { background: #ffe8d8; }
.loading-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; padding: 40px;
}
.loading-screen .spinner {
  width: 40px; height: 40px; border: 3px solid #f0e0d0;
  border-top-color: #e8a888; border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-screen p { font-size: 14px; color: #c0a898; text-align: center; line-height: 1.8; }
.chat {
  flex: 1; overflow-y: auto; padding: 20px 14px 8px;
  display: flex; flex-direction: column; gap: 14px;
  -webkit-overflow-scrolling: touch; background: #faf8f5;
}
.msg-sys {
  background: #fff8f4; border: 1px solid #f0ddd0; border-radius: 14px;
  padding: 16px 20px; font-size: 14px; color: #8c7060;
  text-align: center; line-height: 1.8; white-space: pre-line;
}
.msg-user-wrap { display: flex; justify-content: flex-end; }
.msg-user {
  background: #e8f4f0; border: 1px solid #cce8de;
  border-radius: 18px 18px 4px 18px;
  padding: 12px 16px; max-width: 78%;
  font-size: 15px; line-height: 1.6; color: #2d5a4a;
}
.msg-pastor-wrap { display: flex; gap: 10px; align-items: flex-start; }
.pastor-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #f0c8b0, #e8a888);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; margin-top: 2px;
}
.pastor-inner { flex: 1; }
.pastor-label { font-size: 10px; color: #c0a898; letter-spacing: 1.5px; margin-bottom: 5px; }
.pastor-bubble {
  background: #fff; border: 1px solid #ede8e2; border-left: 3px solid #e8a888;
  border-radius: 4px 16px 16px 16px; padding: 14px 18px;
  font-size: 15px; line-height: 1.9; color: #4a3828;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
.tag {
  font-size: 11px; color: #c07850; background: #fff5ee;
  border: 1px solid #f0d8c0; border-radius: 20px; padding: 3px 11px;
}
.btn-more {
  margin-top: 9px; background: none; border: 1px solid #e0c8b8; color: #a08070;
  font-size: 12px; font-family: inherit; padding: 5px 14px;
  border-radius: 20px; cursor: pointer; -webkit-appearance: none;
}
.btn-more:active { background: #fff0e8; }
/* 통계 */
.stats-bubble {
  background: #fff; border: 1px solid #ede8e2; border-left: 3px solid #a8c8b8;
  border-radius: 4px 16px 16px 16px; padding: 16px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.stats-tabs { display: flex; margin-bottom: 14px; border-radius: 8px; overflow: hidden; border: 1px solid #ede8e2; }
.stats-tab {
  flex: 1; padding: 7px 4px; font-size: 11px; text-align: center;
  color: #b0a090; background: #faf8f5; cursor: pointer; border: none; font-family: inherit;
}
.stats-tab.active { background: #fff; color: #7a5c48; font-weight: 600; border-bottom: 2px solid #e8a888; }
.stats-panel { display: none; }
.stats-panel.active { display: block; }
.stats-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #f0e8e0; }
.stats-key { font-size: 13px; color: #a09080; }
.stats-val { font-size: 15px; color: #7a5c48; font-weight: 600; }
.stats-section-title { font-size: 10px; color: #c0a898; letter-spacing: 2px; margin: 12px 0 8px; }
.stats-bar-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.stats-bar-name { font-size: 12px; color: #9a8878; width: 88px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.stats-bar-track { flex: 1; background: #f5efe8; border-radius: 4px; height: 6px; }
.stats-bar-fill { height: 6px; border-radius: 4px; background: linear-gradient(90deg, #f0c8a8, #e8a080); }
.stats-bar-count { font-size: 12px; color: #c0a090; width: 28px; text-align: right; flex-shrink: 0; }
.topic-pill-wrap { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.topic-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid #ede0d8; color: #b09080; background: #faf5f0; }
.topic-pill.mine { border-color: #f0c0a0; color: #c07850; background: #fff5ee; }
/* 로딩 점 */
.loading-dots { display: flex; gap: 5px; padding: 12px 16px; background: #fff; border-radius: 4px 16px 16px 16px; border: 1px solid #ede8e2; width: fit-content; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #e8c0a8; animation: pulse 1.2s infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1} }
/* 입력 */
.input-area { padding: 10px 14px 28px; flex-shrink: 0; background: #fff; border-top: 1px solid #ede8e2; }
.input-box { background: #faf8f5; border: 1px solid #e8e0d8; border-radius: 24px; display: flex; align-items: flex-end; gap: 8px; padding: 10px 10px 10px 16px; }
textarea { flex: 1; background: none; border: none; outline: none; color: #4a3828; font-family: inherit; font-size: 16px; line-height: 1.5; resize: none; max-height: 100px; min-height: 24px; }
textarea::placeholder { color: #c8b8a8; }
.btn-send { width: 40px; height: 40px; border-radius: 50%; border: none; background: #e8a888; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; }
.btn-send:disabled { background: #e8e0d8; cursor: default; }
.btn-send:active:not(:disabled) { background: #e09070; }
.input-hint { text-align: center; font-size: 11px; color: #c8b8a8; margin-top: 7px; }
/* 빠른 버튼 */
.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 14px 0; background: #fff; }
.q-btn { font-size: 12px; color: #a07858; background: #fff8f4; border: 1px solid #f0d8c8; border-radius: 20px; padding: 5px 13px; cursor: pointer; -webkit-appearance: none; white-space: nowrap; }
.q-btn:active { background: #ffe8d8; }
</style>
</head>
<body>
<div class="header">
  <div class="header-dots">✦ ✦ ✦</div>
  <div class="header-title">말씀 멘토링</div>
  <div class="header-sub">A CHURCH LONDON</div>
  <div class="header-count" id="dataCount">말씀 로딩 중...</div>
  <button class="btn-stats" onclick="showStats()">📊 통계</button>
</div>
<div id="loadingScreen" class="loading-screen">
  <div class="spinner"></div>
  <p>목사님의 말씀을 불러오는 중입니다<br>잠시만 기다려 주세요 🙏</p>
</div>
<div class="chat" id="chat" style="display:none">
  <div class="msg-sys">마음에 담긴 고민이나 어려움을
자유롭게 나눠주세요 🙏
목사님의 말씀 묵상 중에서
당신을 위한 메시지를 찾아드립니다.</div>
</div>
<div id="quickBtns" class="quick-btns" style="display:none">
  <button class="q-btn" onclick="quickSend('믿음이 흔들려요')">믿음이 흔들려요</button>
  <button class="q-btn" onclick="quickSend('너무 힘들어요')">너무 힘들어요</button>
  <button class="q-btn" onclick="quickSend('기도가 안 돼요')">기도가 안 돼요</button>
  <button class="q-btn" onclick="quickSend('외로워요')">외로워요</button>
  <button class="q-btn" onclick="quickSend('두려워요')">두려워요</button>
  <button class="q-btn" onclick="quickSend('감사해요')">감사해요</button>
</div>
<div id="inputArea" class="input-area" style="display:none">
  <div class="input-box">
    <textarea id="input" placeholder="요즘 이런 마음이에요..." rows="1" maxlength="300"></textarea>
    <button class="btn-send" id="sendBtn" disabled onclick="send()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">메시지를 입력하고 전송하세요</div>
</div>
<script>
const CDN_URL = 'https://cdn.jsdelivr.net/gh/hskimss/worship-data@main/classified_messages.json';
const KEYWORDS = {
  '신앙':['믿음','믿어','불안','두려','걱정','확신','의심','흔들','믿고','신뢰','신앙'],
  '기도':['기도','간구','응답','기도하','무릎','기도가','응답이'],
  '고난과 낮아짐':['힘들','고통','고난','아파','지쳐','낮아','겸손','낙심','포기','눈물','상처','실패','어렵','힘겨','괴로','지친','힘이'],
  '담대함과 평안':['평안','담대','불안해','두렵','무서','걱정돼','염려','마음이 무거','겁','떨려'],
  '자아와 자존감':['자존감','상처받','자신감','열등','비교','인정받','외로','속상','억울','자괴감','나 자신','나는 왜','왜 나만'],
  '회개와 회복':['회개','회복','치유','죄','실수했','넘어졌','무너','돌이','용서받','고쳐','잘못'],
  '복음과 십자가':['십자가','복음','예수','구원','보혈','은혜','예수님','주님'],
  '영적전쟁':['영적','마귀','사탄','시험','싸움','대적','유혹','공격','방해'],
  '감사':['감사','기쁨','기뻐','찬양','감격','감사하','기쁘'],
  '관계':['관계','가족','친구','직장','사람','갈등','용서','사랑','외로','혼자','고립','따돌','왕따','부부','부모'],
  '충성과 중심':['충성','헌신','사명','중심이 흔들','사역','사명감','부르심','게을'],
  '인도와 보호':['방향','길을 모르','인도','막막','미래','어디로','어떻게 해야','진로','결정하','방황'],
  '분별과 선택':['선택','결정','고민','어떻게 해야','갈림길','판단','분별','어떡'],
  '성령과 기름부으심':['성령','기름부으심','충만해지','능력','임재','은사'],
  '영광':['영광','변화','목적','의미를 모르','비전','삶의 의미'],
  '예배':['예배','경배','찬양하','하나님 앞','예배가'],
  '주권':['주권','다스림','맡기','내려놓','통제','놓아'],
  '충만':['충만','공허','비어있','채워','허전','공허함'],
  '화해와 일치':['화해','일치','하나됨','용서하','화목','연합','화해하']
};

let MSG_DATA = null;
let totalCount = 0;
const used = new Set();

// 데이터 로딩
async function loadData() {
  try {
    const res = await fetch(CDN_URL);
    MSG_DATA = await res.json();
    totalCount = Object.values(MSG_DATA).reduce((s, v) => s + v.length, 0);
    document.getElementById('dataCount').textContent = `말씀 ${totalCount.toLocaleString()}개 준비됨`;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('chat').style.display = 'flex';
    document.getElementById('quickBtns').style.display = 'flex';
    document.getElementById('inputArea').style.display = 'block';
    recordVisit();
  } catch(e) {
    document.getElementById('loadingScreen').innerHTML = '<p style="color:#c09080">데이터 로딩 실패<br>새로고침 해주세요</p>';
  }
}

// 통계
function getStats(){try{const r=localStorage.getItem('wm_stats');return r?JSON.parse(r):{users:{},catCounts:{},totalMessages:0};}catch(e){return{users:{},catCounts:{},totalMessages:0};}}
function saveStats(s){try{localStorage.setItem('wm_stats',JSON.stringify(s));}catch(e){}}
function getUserId(){let id=localStorage.getItem('wm_uid');if(!id){id='u'+Date.now()+Math.random().toString(36).slice(2,7);localStorage.setItem('wm_uid',id);}return id;}
function recordUsage(cats){
  const s=getStats(); const uid=getUserId();
  if(!s.users[uid]) s.users[uid]={visits:0,messages:0,firstSeen:new Date().toISOString().slice(0,10),catCounts:{}};
  s.users[uid].messages=(s.users[uid].messages||0)+1;
  s.users[uid].lastSeen=new Date().toISOString().slice(0,10);
  if(!s.users[uid].catCounts) s.users[uid].catCounts={};
  s.totalMessages=(s.totalMessages||0)+1;
  for(const c of cats){s.catCounts[c]=(s.catCounts[c]||0)+1; s.users[uid].catCounts[c]=(s.users[uid].catCounts[c]||0)+1;}
  saveStats(s);
}
function recordVisit(){
  const s=getStats(); const uid=getUserId();
  if(!s.users[uid]) s.users[uid]={visits:0,messages:0,firstSeen:new Date().toISOString().slice(0,10),catCounts:{}};
  s.users[uid].visits=(s.users[uid].visits||0)+1;
  s.users[uid].lastSeen=new Date().toISOString().slice(0,10);
  saveStats(s);
}
function showStats(){
  const s=getStats(); const uid=getUserId();
  const userCount=Object.keys(s.users).length;
  const totalMsg=s.totalMessages||0;
  const myData=s.users[uid]||{};
  const myMsg=myData.messages||0;
  const myVisits=myData.visits||0;
  const allCats=Object.entries(s.catCounts||{}).sort((a,b)=>b[1]-a[1]);
  const maxAll=allCats.length?allCats[0][1]:1;
  const topAllHtml=allCats.length?allCats.slice(0,8).map(([cat,cnt])=>
    `<div class="stats-bar-item"><div class="stats-bar-name">${cat}</div><div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round(cnt/maxAll*100)}%"></div></div><div class="stats-bar-count">${cnt}</div></div>`
  ).join(''):`<div style="font-size:13px;color:#c0a898;padding:8px 0;text-align:center">아직 데이터가 없어요</div>`;
  const myCats=Object.entries(myData.catCounts||{}).sort((a,b)=>b[1]-a[1]);
  const maxMy=myCats.length?myCats[0][1]:1;
  const myTopicHtml=myCats.length?myCats.slice(0,5).map(([cat,cnt])=>
    `<div class="stats-bar-item"><div class="stats-bar-name">${cat}</div><div class="stats-bar-track"><div class="stats-bar-fill" style="width:${Math.round(cnt/maxMy*100)}%"></div></div><div class="stats-bar-count">${cnt}</div></div>`
  ).join(''):`<div style="font-size:13px;color:#c0a898;padding:8px 0">아직 말씀을 받지 않으셨어요</div>`;
  const pillHtml=Object.keys(MSG_DATA||{}).map(cat=>
    `<span class="topic-pill ${(myData.catCounts||{})[cat]?'mine':''}">${cat}</span>`
  ).join('');

  addMsg(`<div class="msg-pastor-wrap"><div class="pastor-avatar">📊</div><div class="pastor-inner"><div class="pastor-label">STATISTICS</div><div class="stats-bubble">
<div class="stats-tabs">
  <button class="stats-tab active" onclick="switchTab(this,'tab-overall')">전체 현황</button>
  <button class="stats-tab" onclick="switchTab(this,'tab-mine')">내 기록</button>
  <button class="stats-tab" onclick="switchTab(this,'tab-topic')">토픽 분석</button>
</div>
<div id="tab-overall" class="stats-panel active">
  <div class="stats-row"><span class="stats-key">👥 전체 사용자</span><span class="stats-val">${userCount}명</span></div>
  <div class="stats-row"><span class="stats-key">💌 전체 말씀 수신</span><span class="stats-val">${totalMsg}회</span></div>
  <div class="stats-row" style="border-bottom:none"><span class="stats-key">📖 전체 말씀 수</span><span class="stats-val">${totalCount.toLocaleString()}개</span></div>
  <div class="stats-section-title">인기 주제 TOP 8</div>
  ${topAllHtml}
</div>
<div id="tab-mine" class="stats-panel">
  <div class="stats-row"><span class="stats-key">🙋 내 말씀 수신</span><span class="stats-val">${myMsg}회</span></div>
  <div class="stats-row"><span class="stats-key">📅 첫 방문</span><span class="stats-val">${myData.firstSeen||'오늘'}</span></div>
  <div class="stats-row"><span class="stats-key">🔁 방문 횟수</span><span class="stats-val">${myVisits}회</span></div>
  <div class="stats-row" style="border-bottom:none"><span class="stats-key">🕐 최근 방문</span><span class="stats-val">${myData.lastSeen||'오늘'}</span></div>
  <div class="stats-section-title">내가 주로 받은 말씀 주제</div>
  ${myTopicHtml}
</div>
<div id="tab-topic" class="stats-panel">
  <div class="stats-section-title">전체 주제 목록</div>
  <div class="topic-pill-wrap">${pillHtml}</div>
  <div style="font-size:10px;color:#c0a898;margin-top:8px">✦ 주황 = 내가 받은 주제</div>
</div>
</div></div></div></div>`);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}
function switchTab(btn,panelId){
  const bubble=btn.closest('.stats-bubble');
  bubble.querySelectorAll('.stats-tab').forEach(t=>t.classList.remove('active'));
  bubble.querySelectorAll('.stats-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  bubble.querySelector('#'+panelId).classList.add('active');
}

// 키워드 매칭
function matchCats(text){
  const scores={};
  for(const[cat,kws] of Object.entries(KEYWORDS)) scores[cat]=kws.filter(kw=>text.includes(kw)).length;
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top=sorted.filter(([,s])=>s>0).slice(0,3).map(([c])=>c);
  return top.length?top:['신앙','담대함과 평안','기도'];
}
function pickMsg(cats){
  for(const cat of cats){
    const msgs=(MSG_DATA[cat]||[]).filter(m=>!used.has(m));
    if(msgs.length){const m=msgs[Math.floor(Math.random()*msgs.length)];used.add(m);return{text:m,cat};}
  }
  // 중복 허용 fallback
  const cat=cats[0];
  const msgs=MSG_DATA[cat]||[];
  return{text:msgs[Math.floor(Math.random()*msgs.length)],cat};
}

function addMsg(html){
  const chat=document.getElementById('chat');
  chat.insertAdjacentHTML('beforeend',html);
  chat.scrollTop=chat.scrollHeight;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function send(){
  if(!MSG_DATA) return;
  const ta=document.getElementById('input');
  const text=ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';
  document.getElementById('sendBtn').disabled=true;
  addMsg(`<div class="msg-user-wrap"><div class="msg-user">${escHtml(text)}</div></div>`);
  const loadId='load-'+Date.now();
  addMsg(`<div class="msg-pastor-wrap" id="${loadId}"><div class="pastor-avatar">✦</div><div class="pastor-inner"><div class="pastor-label">말씀 찾는 중</div><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`);
  const cats=matchCats(text);
  setTimeout(()=>{
    document.getElementById(loadId)?.remove();
    const r=pickMsg(cats);
    recordUsage(cats);
    showPastorMsg(r,cats);
  },700);
}
function quickSend(text){
  if(!MSG_DATA) return;
  document.getElementById('input').value=text;
  send();
}
function showPastorMsg(r,cats){
  const tagsHtml=cats.map(c=>`<span class="tag">${c}</span>`).join('');
  const btnData=JSON.stringify(cats).replace(/"/g,'&quot;');
  addMsg(`<div class="msg-pastor-wrap"><div class="pastor-avatar">✦</div><div class="pastor-inner"><div class="pastor-label">목사님 말씀</div><div class="pastor-bubble">${escHtml(r.text)}</div><div class="tags">${tagsHtml}</div><button class="btn-more" onclick="more(${btnData})">다른 말씀 보기 →</button></div></div>`);
  document.getElementById('chat').scrollTop=document.getElementById('chat').scrollHeight;
}
function more(cats){
  if(!MSG_DATA) return;
  const r=pickMsg(cats); recordUsage(cats); showPastorMsg(r,cats);
}

const ta2=document.getElementById('input');
const btn2=document.getElementById('sendBtn');
ta2.addEventListener('input',function(){
  this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,100)+'px';
  btn2.disabled=!this.value.trim();
});
ta2.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
});

loadData();
</script>
